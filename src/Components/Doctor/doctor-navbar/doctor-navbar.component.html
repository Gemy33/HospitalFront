<aside class="sidebar" >

  <!-- Header -->
  <div class="sidebar-header">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.5 2 6 4.5 6 8c0 2.5 1.4 4.7 3.5 5.8V15h5v-1.2C16.6 12.7 18 10.5 18 8c0-3.5-2.5-6-6-6z" fill="currentColor" opacity="0.9"/>
          <rect x="9.5" y="15" width="5" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="8" y="17" width="8" height="3" rx="1.5" fill="currentColor" opacity="0.7"/>
        </svg>
      </div>
      <span class="logo-text">MediLink</span>
    </div>
    <button>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline></polyline>
      </svg>
    </button>
  </div>

  <!-- Doctor Card -->
  <div class="doctor-card">
    <div class="avatar-ring">
      <div class="avatar">
        <img *ngIf="doctor.avatarUrl" [src]="doctor.avatarUrl" [alt]="doctor.name" />
        <span *ngIf="!doctor.avatarUrl">{{ getInitials(doctor.name) }}</span>
      </div>
      <span class="status-dot" [class.online]="doctor.isOnline"></span>
    </div>
    <div class="doctor-info" >
      <p class="doctor-name">{{ doctor.name }}</p>
      <p class="doctor-specialty">{{ doctor.specialty }}</p>
      <span class="badge-status" [class.online]="doctor.isOnline">
        {{ doctor.isOnline ? 'Available' : 'Away' }}
      </span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <a class="nav-item" [routerLink]="['/doctor/dashboard']" routerLinkActive="active" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </a>

    <a class="nav-item" [routerLink]="['/doctor/profile',DoctorId]" routerLinkActive="active" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </span>
      <span class="nav-label">My Profile</span>
    </a>

    <a class="nav-item" [routerLink]="['/doctor/Availabilty']" routerLinkActive="active" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="nav-label">Set Availability</span>
    </a>

    <!-- <a class="nav-item"  [routerLink]="['/doctor/booking',4]" routerLinkActive="active" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
        </svg>
      </span>
      <span class="nav-label">Patient Bookings</span>
    </a> -->

    <a class="nav-item nav-item--zoom" (click)="startZoomCall()" [class.active]="isInCall"  style="cursor:pointer">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </span>
      <span class="nav-label">{{ isInCall ? 'End Call' : 'Start Video Call' }}</span>
    </a>

   
    <a class="nav-item" [routerLink]="['/doctor/patients']" routerLinkActive="active" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span class="nav-label">My Patients</span>
    </a>


  </nav>

  <!-- Stats -->
  <div class="stats-strip" >
    <div class="stat-chip">
      <span class="stat-num">{{ stats.todayAppointments }}</span>
      <span class="stat-lbl">Today</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num">{{ stats.totalPatients }}</span>
      <span class="stat-lbl">Patients</span>
    </div>
  </div>

  <!-- Sign Out -->
  <div class="sidebar-footer">
    <button class="signout-btn" (click)="signOut()" >
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span class="nav-label">Sign Out</span>
    </button>
  </div>

</aside>
