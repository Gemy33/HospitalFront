<div class="container py-5">
  <div class="row mb-5 justify-content-center">
    <div class="col-lg-10">
      <div class="card border-0 shadow-sm p-4 rounded-4 bg-primary text-white">
        <h2 class="mb-4 text-center fw-bold">Find a Specialist</h2>
        <div class="row g-3">
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text border-0 bg-white text-primary">
                <i class="bi bi-search"></i>
              </span>
              <input type="text" class="form-control border-0 py-2" 
                     placeholder="Search doctor name..." [(ngModel)]="searchQuery">
            </div>
          </div>
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text border-0 bg-white text-primary">
                <i class="bi bi-filter"></i>
              </span>
              <select class="form-select border-0 py-2" [(ngModel)]="selectedSpeciality">
                <option value="">All Specialities</option>
                <option value="Gynecology">Gynecology</option>
                <option value="Cardiology">Cardiology</option>
                <option value="Pediatrics">Pediatrics</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div *ngFor="let doc of filteredDoctors" class="col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 doctor-card">
        <div class="card-body p-4">
          <div class="text-center mb-3">
            <img src="https://ui-avatars.com/api/?name=Dr+{{doc.name}}&background=e7f1ff&color=0d6efd&size=100" 
                 class="rounded-circle mb-3 border border-3 border-light shadow-sm" alt="Doctor">
            <h5 class="fw-bold mb-0">Dr. {{ doc.name }}</h5>
            <span class="badge bg-blue-subtle text-primary rounded-pill px-3">{{ doc.speciality }}</span>
          </div>
          
          <div class="info-list small mb-4">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted"><i class="bi bi-clock-history me-2"></i>Experience</span>
              <span class="fw-semibold">{{ doc.yearsOfExperience }} Years</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted"><i class="bi bi-telephone me-2"></i>Contact</span>
              <span class="fw-semibold">{{ doc.phone }}</span>
            </div>
          </div>

          <p class="text-secondary small text-center mb-4 line-clamp-2">
            {{ doc.bio }}
          </p>

          <div class="d-grid gap-2">
            <button class="btn btn-primary rounded-3">Book Appointment</button>
            <button class="btn btn-outline-light text-primary border-primary-subtle rounded-3">View Profile</button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="filteredDoctors.length === 0" class="col-12 text-center py-5">
      <div class="text-muted">
        <i class="bi bi-person-exclamation display-1"></i>
        <h4 class="mt-3">No doctors found matching your criteria.</h4>
      </div>
    </div>
  </div>
</div>
