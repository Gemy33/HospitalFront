<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="bg-primary p-5 text-center text-white">
          <div class="position-relative d-inline-block">
            <img src="https://ui-avatars.com/api/?name={{patientData.name}}&background=random&size=128" 
                 class="rounded-circle border border-4 border-white shadow" 
                 alt="Profile Picture">
          </div>
          <h2 class="mt-3 mb-1 fw-bold">{{ patientData.name }}</h2>
          <span class="badge bg-light text-primary px-3 py-2 rounded-pill">Patient ID: #00{{ patientData.id }}</span>
        </div>

        <div class="card-body p-4 p-md-5">
          <h5 class="mb-4 text-secondary fw-bold">Personal Information</h5>
          
          <div class="row g-4">
            <div class="col-md-6">
              <div class="d-flex align-items-center">
                <div class="icon-box bg-blue-light text-primary rounded-3 p-3 me-3">
                  <i class="bi bi-person"></i>
                </div>
                <div>
                  <small class="text-muted d-block">Full Name</small>
                  <span class="fw-semibold">{{ patientData.name }}</span>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex align-items-center">
                <div class="icon-box bg-blue-light text-primary rounded-3 p-3 me-3">
                  <i class="bi bi-gender-ambiguous"></i>
                </div>
                <div>
                  <small class="text-muted d-block">Gender</small>
                  <span class="fw-semibold">{{ getGender(patientData.gender) }}</span>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex align-items-center">
                <div class="icon-box bg-blue-light text-primary rounded-3 p-3 me-3">
                  <i class="bi bi-envelope"></i>
                </div>
                <div>
                  <small class="text-muted d-block">Email Address</small>
                  <span class="fw-semibold">{{ patientData.email }}</span>
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="d-flex align-items-center">
                <div class="icon-box bg-blue-light text-primary rounded-3 p-3 me-3">
                  <i class="bi bi-telephone"></i>
                </div>
                <div>
                  <small class="text-muted d-block">Phone Number</small>
                  <span class="fw-semibold">{{ patientData.phone }}</span>
                </div>
              </div>
            </div>
          </div>

          <hr class="my-5 opacity-10">

          <div class="d-flex gap-2">
            <button class="btn btn-primary px-4 py-2 rounded-3">
              <i class="bi bi-pencil-square me-2"></i>Edit Profile
            </button>
            <button class="btn btn-outline-secondary px-4 py-2 rounded-3">
              View Appointments
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
