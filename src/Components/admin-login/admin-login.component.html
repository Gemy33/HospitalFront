    <div class="al-root">

    <!-- Background orbs -->
    <div class="al-orb al-orb--1"></div>
    <div class="al-orb al-orb--2"></div>

    <div class="al-card">
        <!-- Brand -->
        <div class="al-brand">
        <div class="al-brand-orb">
            <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path d="M9 3h2v5h5v2h-5v5H9v-5H4V8h5z"/>
            </svg>
        </div>
        <div class="al-brand-text">
            <span class="al-brand-name">MediCore</span>
            <span class="al-brand-role">Admin Portal</span>
        </div>
        </div>

        <!-- Heading -->
        <div class="al-heading">
        <h1 class="al-title">Welcome back</h1>
        <p class="al-sub">Sign in to your admin account</p>
        </div>

        <!-- Error -->
        <div class="al-error" *ngIf="error()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" width="15" height="15">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
        </svg>
        {{ error() }}
        </div>

        <!-- Form -->
        <div class="al-form">

        <!-- Email -->
        <div class="al-field">
            <label class="al-label">Email Address</label>
            <div class="al-input-wrap">
            <svg class="al-input-ico" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                width="16" height="16">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4
                        c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22 6 12 13 2 6"/>
            </svg>
            <input
                class="al-input"
                type="email"
                placeholder="admin@example.com"
                [(ngModel)]="email"
                (keydown)="onEnter($event)"
                autocomplete="email"
            />
            </div>
        </div>

        <!-- Password -->
        <div class="al-field">
            <label class="al-label">Password</label>
            <div class="al-input-wrap">
            <svg class="al-input-ico" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                width="16" height="16">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
                class="al-input"
                [type]="showPass() ? 'text' : 'password'"
                placeholder="••••••••"
                [(ngModel)]="password"
                (keydown)="onEnter($event)"
                autocomplete="current-password"
            />
          <button class="al-eye-btn" type="button"
        (click)="togglePassword()"
        [title]="showPass() ? 'Hide password' : 'Show password'">
            </button>
            </div>
        </div>

        <!-- Submit -->
        <button
            class="al-btn"
            [disabled]="loading()"
            (click)="login()"
        >
            <span *ngIf="!loading()">
            Sign In
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" width="16" height="16">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            </span>
            <span class="al-spinner" *ngIf="loading()">
            <span></span><span></span><span></span>
            </span>
        </button>

        </div>

        <!-- Footer note -->
        <p class="al-note">
        Admin access only. Unauthorized access is prohibited.
        </p>

    </div>
    </div>
